name: Validate PR

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Clean caches
        run: rm -rf .next .open-next src/generated

      - name: Install dependencies
        run: npm ci

      - name: Generate content manifest
        run: npm run prebuild

      - name: Prepare TypeScript environment
        run: |
          echo '/// <reference types="next" />' > next-env.d.ts
          echo '/// <reference types="next/image-types/global" />' >> next-env.d.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint changed files
        shell: bash
        run: |
          FILES=$(git diff --name-only origin/master...HEAD -- '*.ts' '*.tsx')
          if [ -n "$FILES" ]; then
            echo "$FILES"
            npx eslint $FILES
          else
            echo "No changed TypeScript files."
          fi

      - name: Next build
        run: npm run build

      - name: OpenNext Cloudflare build
        run: npx opennextjs-cloudflare build

      - name: Verify Cloudflare runtime
        shell: bash
        run: |
          set -euo pipefail

          npx opennextjs-cloudflare preview --port 8787 > preview.log 2>&1 &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          READY=0
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8787/ > /dev/null; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Preview did not start."
            cat preview.log
            exit 1
          fi

          URL="http://127.0.0.1:8787"
          
          echo "Verificando Portada..."
          RES=$(curl -s "$URL/")
          if ! echo "$RES" | grep -q "La guía de"; then echo "Fallo en portada"; exit 1; fi
          if echo "$RES" | grep -q "0 guías y noticias"; then echo "Fallo en portada: sin noticias"; exit 1; fi
          
          echo "Verificando Blog..."
          RES=$(curl -s "$URL/blog")
          if echo "$RES" | grep -q "0 guías y noticias"; then echo "Fallo en blog"; exit 1; fi
          
          echo "Verificando Destinos..."
          RES=$(curl -s "$URL/destinos")
          if echo "$RES" | grep -q "Estamos publicando estas guías; vuelve pronto"; then echo "Fallo en destinos"; exit 1; fi
          
          echo "Verificando Tokio..."
          if ! curl -s -f "$URL/destinos/donde-dormir-en-tokio" > /dev/null; then echo "404 en Tokio"; exit 1; fi
          
          echo "Verificando Kioto..."
          if ! curl -s -f "$URL/destinos/donde-dormir-en-kioto" > /dev/null; then echo "404 en Kioto"; exit 1; fi
          
          echo "Verificando Osaka..."
          if ! curl -s -f "$URL/destinos/que-ver-en-osaka" > /dev/null; then echo "404 en Osaka"; exit 1; fi
          
          echo "Verificando Calculadora JR Pass..."
          RES=$(curl -s "$URL/herramientas/jr-pass-calculadora")
          if ! echo "$RES" | grep -q "Calculadora JR Pass"; then echo "Fallo en JR Pass"; exit 1; fi
          
          echo "Verificando Cambio Yen..."
          RES=$(curl -s "$URL/cambio-yen-euro")
          if ! echo "$RES" | grep -q "Cambio de referencia"; then echo "Fallo en yen"; exit 1; fi
          
          echo "Verificando Embed Yen..."
          RES=$(curl -s "$URL/embed/cambio-yen")
          if ! echo "$RES" | grep -q "Actualizado"; then echo "Fallo en embed yen"; exit 1; fi
          
          echo "Verificando RSS..."
          RES=$(curl -s "$URL/feed.xml")
          if ! echo "$RES" | grep -q "<item>"; then echo "Fallo en RSS (vacío)"; exit 1; fi
          
          echo "Cloudflare runtime validation passed."
