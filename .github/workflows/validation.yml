name: Validate PR

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Clean caches
        run: rm -rf .next .open-next src/generated

      - name: Install dependencies
        run: npm ci

      - name: Generate content manifest
        run: npm run prebuild

      - name: Prepare TypeScript environment
        run: |
          echo '/// <reference types="next" />' > next-env.d.ts
          echo '/// <reference types="next/image-types/global" />' >> next-env.d.ts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint changed files
        shell: bash
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/master...HEAD -- '*.ts' '*.tsx')
          if [ -n "$FILES" ]; then
            echo "$FILES"
            npx eslint $FILES
          else
            echo "No changed TypeScript files."
          fi

      - name: Next build
        run: npm run build

      - name: OpenNext Cloudflare build
        run: npx opennextjs-cloudflare build

      - name: Verify Cloudflare runtime
        shell: bash
        run: |
          set -euo pipefail

          npx opennextjs-cloudflare preview --port 8787 > preview.log 2>&1 &
          PREVIEW_PID=$!

          cleanup() {
            kill "$PREVIEW_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          READY=0
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8787/ > /dev/null; then
              READY=1
              break
            fi
            sleep 2
          done

          if [ "$READY" -ne 1 ]; then
            echo "Preview did not start."
            cat preview.log
            exit 1
          fi

          URL="http://127.0.0.1:8787"
          TS=$(date +%s)

          check_url() {
            local PATHNAME=$1
            local EXPECTED_1=$2
            local EXPECTED_2=$3
            local NOT_EXPECTED=$4

            for SUFFIX in "" "?audit=$TS"; do
              local TARGET="${URL}${PATHNAME}${SUFFIX}"
              echo "Checking: $TARGET"
              
              HTTP_STATUS=$(curl -fsS -w "%{http_code}" -o temp_body.html "$TARGET" || echo "FAIL")
              
              if [ "$HTTP_STATUS" != "200" ]; then
                echo "❌ ERROR: Status $HTTP_STATUS for $TARGET"
                exit 1
              fi

              if [ -n "$EXPECTED_1" ]; then
                if ! grep -q "$EXPECTED_1" temp_body.html; then echo "❌ Missing '$EXPECTED_1'"; exit 1; fi
              fi
              if [ -n "$EXPECTED_2" ]; then
                if ! grep -q "$EXPECTED_2" temp_body.html; then echo "❌ Missing '$EXPECTED_2'"; exit 1; fi
              fi
              if [ -n "$NOT_EXPECTED" ]; then
                if grep -q "$NOT_EXPECTED" temp_body.html; then echo "❌ Found forbidden '$NOT_EXPECTED'"; exit 1; fi
              fi

              echo "✅ 200 OK - Passed assertions"
            done
          }

          echo "Starting rigorous GET assertions..."
          check_url "/" "La guía de" "" ""
          check_url "/blog" "Subida del JR Pass" "" "0 guías y noticias"
          check_url "/destinos" "Dónde dormir en Tokio" "Qué ver en Osaka" "Estamos publicando estas guías; vuelve pronto"
          check_url "/destinos/donde-dormir-en-tokio" "Dónde dormir en Tokio" "" ""
          check_url "/destinos/donde-dormir-en-kioto" "Dónde dormir en Kioto" "" ""
          check_url "/destinos/que-ver-en-osaka" "Qué ver en Osaka" "" ""
          check_url "/herramientas/jr-pass-calculadora" "¿Merece la pena el JR Pass en 2026?" "" ""
          check_url "/cambio-yen-euro" "Cambio de referencia" "185" ""
          check_url "/embed/cambio-yen" "185" "<input" ""
          check_url "/feed.xml" "<item>" "Subida del JR Pass" ""

          echo "Cloudflare runtime validation passed."
