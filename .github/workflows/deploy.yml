# Despliegue a Cloudflare Workers (OpenNext) en cada push a master.
# El build se hace aquí (runner Linux) porque en Windows opennextjs-cloudflare
# falla al trazar node_modules. Secrets necesarios en el repo:
#   CLOUDFLARE_API_TOKEN  — token con permisos de Workers + KV
#   CLOUDFLARE_ACCOUNT_ID — Account ID de la cuenta de Cloudflare
name: Deploy a Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-produccion
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build OpenNext (incluye next build)
        run: npx opennextjs-cloudflare build

      - name: Deploy a Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verificar en producción con GET
        run: |
          sleep 10
          URL="https://viajajapon.com"
          TS=$(date +%s)

          check_url() {
            local PATHNAME=$1
            local EXPECTED_1=$2
            local EXPECTED_2=$3
            local NOT_EXPECTED=$4

            for SUFFIX in "" "?audit=$TS"; do
              local TARGET="${URL}${PATHNAME}${SUFFIX}"
              echo "Checking: $TARGET"
              
              HTTP_STATUS=$(curl -fsS -w "%{http_code}" -o temp_body.html "$TARGET" || echo "FAIL")
              
              if [ "$HTTP_STATUS" != "200" ]; then
                echo "❌ ERROR: Status $HTTP_STATUS for $TARGET"
                exit 1
              fi

              if [ -n "$EXPECTED_1" ]; then
                if ! grep -q "$EXPECTED_1" temp_body.html; then echo "❌ Missing '$EXPECTED_1'"; exit 1; fi
              fi
              if [ -n "$EXPECTED_2" ]; then
                if ! grep -q "$EXPECTED_2" temp_body.html; then echo "❌ Missing '$EXPECTED_2'"; exit 1; fi
              fi
              if [ -n "$NOT_EXPECTED" ]; then
                if grep -q "$NOT_EXPECTED" temp_body.html; then echo "❌ Found forbidden '$NOT_EXPECTED'"; exit 1; fi
              fi

              echo "✅ 200 OK - Passed assertions"
            done
          }

          echo "Starting rigorous GET assertions..."
          check_url "/" "La guía de" "" ""
          check_url "/blog" "Subida del JR Pass" "" "0 guías y noticias"
          check_url "/destinos" "Dónde dormir en Tokio" "Qué ver en Osaka" "Estamos publicando estas guías; vuelve pronto"
          check_url "/destinos/donde-dormir-en-tokio" "Dónde dormir en Tokio" "" ""
          check_url "/destinos/donde-dormir-en-kioto" "Dónde dormir en Kioto" "" ""
          check_url "/destinos/que-ver-en-osaka" "Qué ver en Osaka" "" ""
          check_url "/herramientas/jr-pass-calculadora" "¿Merece la pena el JR Pass en 2026?" "" ""
          check_url "/cambio-yen-euro" "Cambio de referencia" "165" ""
          check_url "/embed/cambio-yen" "165" "<input" ""
          check_url "/feed.xml" "<item>" "Subida del JR Pass" ""

          echo "¡Todas las comprobaciones de producción pasaron!"
