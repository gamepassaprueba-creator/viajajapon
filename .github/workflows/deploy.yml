# Despliegue a Cloudflare Workers (OpenNext) en cada push a master.
# El build se hace aquí (runner Linux) porque en Windows opennextjs-cloudflare
# falla al trazar node_modules. Secrets necesarios en el repo:
#   CLOUDFLARE_API_TOKEN  — token con permisos de Workers + KV
#   CLOUDFLARE_ACCOUNT_ID — Account ID de la cuenta de Cloudflare
name: Deploy a Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-produccion
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Build OpenNext (incluye next build)
        run: npx opennextjs-cloudflare build

      - name: Deploy a Cloudflare
        run: npx opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verificar en producción con GET
        run: |
          URL="https://viajajapon.com"
          TS=$(date +%s)

          run_all_checks() {
            check_url() {
              local PATHNAME=$1
              local EXPECTED_1=$2
              local EXPECTED_2=$3
              local NOT_EXPECTED=$4

              for SUFFIX in "" "?audit=$TS"; do
                local TARGET="${URL}${PATHNAME}${SUFFIX}"
                echo "Checking: $TARGET"
                
                HTTP_STATUS=$(curl -sS -o temp_body.html -w "%{http_code}" "$TARGET")
                
                if [ "$HTTP_STATUS" != "200" ]; then
                  echo "❌ ERROR: Status $HTTP_STATUS for $TARGET"
                  cat temp_body.html
                  return 1
                fi

                if [ -n "$EXPECTED_1" ]; then
                  if ! grep -Fq "$EXPECTED_1" temp_body.html; then echo "❌ Missing '$EXPECTED_1'"; return 1; fi
                fi
                if [ -n "$EXPECTED_2" ]; then
                  if ! grep -Fq "$EXPECTED_2" temp_body.html; then echo "❌ Missing '$EXPECTED_2'"; return 1; fi
                fi
                if [ -n "$NOT_EXPECTED" ]; then
                  if grep -Fq "$NOT_EXPECTED" temp_body.html; then echo "❌ Found forbidden '$NOT_EXPECTED'"; return 1; fi
                fi

                echo "✅ 200 OK - Passed assertions"
              done
            }

            echo "Starting rigorous GET assertions..."
            check_url "/" "La guía de" "" "" || return 1
            check_url "/blog" "Subida del JR Pass" "" "0 guías y noticias" || return 1
            check_url "/destinos" "Dónde dormir en Tokio" "Qué ver en Osaka" "Estamos publicando estas guías; vuelve pronto" || return 1
            check_url "/destinos/donde-dormir-en-tokio" "Dónde dormir en Tokio" "" "" || return 1
            check_url "/destinos/donde-dormir-en-kioto" "Dónde dormir en Kioto" "" "" || return 1
            check_url "/destinos/que-ver-en-osaka" "Qué ver en Osaka" "" "" || return 1
            check_url "/herramientas/jr-pass-calculadora" "¿Merece la pena el JR Pass en 2026?" "" "" || return 1
            
            check_url "/cambio-yen-euro" "Cambio de referencia" "Valor estimado de referencia" "" || return 1
            grep -Fq "1€ = ¥" temp_body.html || { echo "❌ Missing '1€ = ¥'"; return 1; }
            
            check_url "/embed/cambio-yen" 'id="r-disp"' 'id="e"' "" || return 1
            grep -Fq 'id="y"' temp_body.html || { echo "❌ Missing 'id=\"y\"'"; return 1; }
            grep -Fq "api.frankfurter.dev" temp_body.html || { echo "❌ Missing 'api.frankfurter.dev'"; return 1; }
            grep -Fq "Valor estimado de referencia" temp_body.html || { echo "❌ Missing 'Valor estimado de referencia'"; return 1; }
            
            check_url "/feed.xml" "<item>" "Subida del JR Pass" "" || return 1

            return 0
          }

          for attempt in 1 2 3 4 5 6; do
            if run_all_checks; then
              echo "¡Todas las comprobaciones de producción pasaron!"
              exit 0
            fi

            echo "Intento $attempt fallido; reintentando..."
            sleep 10
          done

          exit 1
